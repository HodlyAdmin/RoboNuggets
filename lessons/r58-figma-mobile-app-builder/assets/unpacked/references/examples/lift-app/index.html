<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lift — Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050505;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; font-family: 'Barlow', sans-serif;
    }
    .phone {
      width: 375px; height: 812px; background: #0f0f0f;
      border-radius: 32px; overflow: hidden; position: relative;
      box-shadow: 0 40px 100px rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
    }

    /* HEADER */
    .header { padding: 48px 24px 16px; display: flex; align-items: center; justify-content: space-between; }
    .logo-area {}
    .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
    .streak { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .streak svg { width: 14px; height: 14px; color: #e94560; }
    .streak-text { font-size: 12px; font-weight: 600; color: #e94560; }
    .header-right { display: flex; gap: 12px; }
    .icon-btn-dark { width: 36px; height: 36px; background: rgba(255,255,255,0.07); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .icon-btn-dark svg { width: 16px; height: 16px; color: rgba(255,255,255,0.6); }

    /* TODAY CARD */
    .today-section { padding: 0 24px; }
    .today-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .workout-card {
      border-radius: 20px; overflow: hidden; position: relative; height: 186px;
      box-shadow: 0 8px 32px rgba(233,69,96,0.2);
    }
    .workout-card img { width: 100%; height: 100%; object-fit: cover; }
    .workout-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(233,69,96,0.4) 0%, rgba(10,10,20,0.85) 100%); }
    .workout-content { position: absolute; inset: 0; padding: 20px; display: flex; flex-direction: column; justify-content: flex-end; }
    .workout-tag { background: #e94560; color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; letter-spacing: 1.5px; text-transform: uppercase; display: inline-block; margin-bottom: 8px; align-self: flex-start; }
    .workout-name { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 800; color: #fff; line-height: 1; text-transform: uppercase; letter-spacing: 1px; }
    .workout-meta { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 5px; display: flex; align-items: center; gap: 6px; }
    .workout-meta svg { width: 12px; height: 12px; }
    .play-btn { position: absolute; top: 16px; right: 16px; width: 44px; height: 44px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .play-btn svg { width: 18px; height: 18px; color: #fff; }

    /* STATS */
    .stats-row { display: flex; gap: 10px; padding: 14px 24px 0; }
    .stat-card { flex: 1; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 12px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.06); }
    .stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: #fff; }
    .stat-val span { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.4); }
    .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; font-weight: 600; }

    /* EXERCISES */
    .ex-header { padding: 18px 24px 8px; display: flex; justify-content: space-between; align-items: center; }
    .ex-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    .ex-count { font-size: 12px; color: rgba(255,255,255,0.3); font-weight: 500; }

    .exercise-list { padding: 0 24px; display: flex; flex-direction: column; gap: 8px; }
    .ex-row {
      background: rgba(255,255,255,0.04); border-radius: 14px;
      padding: 12px 16px; display: flex; align-items: center; gap: 14px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .ex-row.active { background: rgba(233,69,96,0.1); border-color: rgba(233,69,96,0.3); }
    .ex-num { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.2); width: 20px; flex-shrink: 0; }
    .ex-row.active .ex-num { color: #e94560; }
    .ex-info { flex: 1; }
    .ex-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
    .ex-sets { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .ex-weight { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.5); }
    .ex-row.active .ex-weight { color: #e94560; }

    /* NAV */
    .bottom-nav { margin-top: auto; display: flex; padding: 12px 0 20px; border-top: 1px solid rgba(255,255,255,0.05); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nav-item svg { width: 22px; height: 22px; color: rgba(255,255,255,0.2); }
    .nav-item.active svg { color: #e94560; }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #e94560; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="logo-area">
        <div class="logo">Lift</div>
        <div class="streak"><i data-lucide="flame"></i><span class="streak-text">12 day streak</span></div>
      </div>
      <div class="header-right">
        <div class="icon-btn-dark"><i data-lucide="bar-chart-2"></i></div>
        <div class="icon-btn-dark"><i data-lucide="user"></i></div>
      </div>
    </div>

    <div class="today-section">
      <div class="today-label">Today · Push Day A</div>
      <div class="workout-card">
        <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?w=700&q=85" alt="Workout" />
        <div class="workout-overlay"></div>
        <div class="workout-content">
          <div class="workout-tag">Chest & Shoulders</div>
          <div class="workout-name">Push<br>Day A</div>
          <div class="workout-meta"><i data-lucide="dumbbell"></i> 5 exercises · ~42 min</div>
        </div>
        <div class="play-btn"><i data-lucide="play"></i></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">245 <span>kcal</span></div>
        <div class="stat-lbl">Burned</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">42 <span>min</span></div>
        <div class="stat-lbl">Duration</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">18 <span>sets</span></div>
        <div class="stat-lbl">Volume</div>
      </div>
    </div>

    <div class="ex-header">
      <span class="ex-title">Exercises</span>
      <span class="ex-count">5 total</span>
    </div>

    <div class="exercise-list">
      <div class="ex-row active">
        <div class="ex-num">01</div>
        <div class="ex-info">
          <div class="ex-name">Bench Press</div>
          <div class="ex-sets">4 sets · 8 reps</div>
        </div>
        <div class="ex-weight">80 kg</div>
      </div>
      <div class="ex-row">
        <div class="ex-num">02</div>
        <div class="ex-info">
          <div class="ex-name">Overhead Press</div>
          <div class="ex-sets">3 sets · 10 reps</div>
        </div>
        <div class="ex-weight">50 kg</div>
      </div>
      <div class="ex-row">
        <div class="ex-num">03</div>
        <div class="ex-info">
          <div class="ex-name">Incline DB Press</div>
          <div class="ex-sets">4 sets · 12 reps</div>
        </div>
        <div class="ex-weight">28 kg</div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active"><i data-lucide="home"></i><div class="nav-dot"></div></div>
      <div class="nav-item"><i data-lucide="calendar"></i></div>
      <div class="nav-item"><i data-lucide="plus-circle"></i></div>
      <div class="nav-item"><i data-lucide="trophy"></i></div>
      <div class="nav-item"><i data-lucide="user"></i></div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
